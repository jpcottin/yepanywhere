name: Bridge CI

on:
  push:
    branches: [main]
    tags:
      - 'bridge-v*'
    paths:
      - 'packages/emulator-bridge/**'
      - '.github/workflows/bridge-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/emulator-bridge/**'
      - '.github/workflows/bridge-ci.yml'

permissions:
  contents: write

jobs:
  build-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            binary: emulator-bridge-darwin-arm64
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            binary: emulator-bridge-darwin-amd64
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            binary: emulator-bridge-linux-amd64
          - goos: linux
            goarch: arm64
            runner: ubuntu-22.04-arm
            binary: emulator-bridge-linux-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/emulator-bridge/go.mod
          cache-dependency-path: packages/emulator-bridge/go.sum

      - name: Build binary
        working-directory: packages/emulator-bridge
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # For darwin/amd64 cross-compile on arm64 runner, tell Clang to target x86_64
          if [ "${{ matrix.goos }}" = "darwin" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            export CC="clang -arch x86_64"
          fi

          VERSION="dev"
          if [[ "$GITHUB_REF" == refs/tags/bridge-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/bridge-v}"
          fi

          go build -ldflags="-s -w -X main.bridgeVersion=$VERSION" \
            -o "${{ matrix.binary }}" ./cmd/bridge/

      - name: Verify binary
        working-directory: packages/emulator-bridge
        run: |
          file "${{ matrix.binary }}"
          ls -lh "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: packages/emulator-bridge/${{ matrix.binary }}

  release:
    if: startsWith(github.ref, 'refs/tags/bridge-v')
    needs: build-bridge
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/bridge-v}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        working-directory: binaries
        run: |
          sha256sum emulator-bridge-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Emulator Bridge v${{ steps.version.outputs.VERSION }}
          body: |
            ## Emulator Bridge v${{ steps.version.outputs.VERSION }}

            Pre-built sidecar binaries for Android emulator streaming.

            | Platform | Binary |
            |----------|--------|
            | macOS (Apple Silicon) | `emulator-bridge-darwin-arm64` |
            | macOS (Intel) | `emulator-bridge-darwin-amd64` |
            | Linux x86_64 | `emulator-bridge-linux-amd64` |
            | Linux ARM64 | `emulator-bridge-linux-arm64` |

            After downloading, make executable: `chmod +x emulator-bridge-*`
          files: |
            binaries/emulator-bridge-*
            binaries/checksums-sha256.txt
          draft: false
          prerelease: false
